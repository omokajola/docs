<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Grid Example</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .box {
      background-color: #4caf50;
      color: white;
      padding: 20px;
      margin: 10px 0;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row">
    <div class="col-sm-12 col-md-8 col-lg-6">
      <div class="box">I'm Responsive!</div>
    </div>
    <div class="col-sm-12 col-md-8 col-lg-6">
      <div class="box" style="background-color: #2196f3;">Me Too!</div>
    </div>
  </div>
</div>

</body>
</html>
